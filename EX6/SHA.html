<!DOCTYPE html>
<html>
<head>
    <title>SHA-256 Generator</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        .box {
            background: #1c2833;
            width: 400px;
            margin: 100px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px black;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00c6ff;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0072ff;
            color: white;
        }

        .output {
            margin-top: 15px;
            background: #0d1b2a;
            padding: 10px;
            border-radius: 5px;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>SHA-256 Generator</h2>

    <input type="text" id="input" placeholder="Enter message">
    <button onclick="generate()">Generate Hash</button>

    <div class="output" id="output"></div>
</div>

<script>
function rightRotate(n, d) {
    return ((n >>> d) | (n << (32 - d))) >>> 0;
}

function sha256(message) {
    let h = [
        0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,
        0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19
    ];

    let k = [
        0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,
        0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
        0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,
        0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
        0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,
        0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
        0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,
        0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
        0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,
        0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
        0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,
        0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
        0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,
        0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
        0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,
        0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2
    ];

    let msg = new TextEncoder().encode(message);
    let length = msg.length * 8;

    let padded = Array.from(msg);
    padded.push(0x80);

    while ((padded.length * 8 + 64) % 512 !== 0) padded.push(0);

    for (let i = 7; i >= 0; i--) padded.push((length >>> (i*8)) & 255);

    for (let i = 0; i < padded.length; i += 64) {
        let w = new Array(64).fill(0);

        for (let j = 0; j < 16; j++) {
            w[j] = (padded[i+j*4]<<24)|(padded[i+j*4+1]<<16)|(padded[i+j*4+2]<<8)|(padded[i+j*4+3]);
        }

        for (let j = 16; j < 64; j++) {
            let s0 = rightRotate(w[j-15],7)^rightRotate(w[j-15],18)^(w[j-15]>>>3);
            let s1 = rightRotate(w[j-2],17)^rightRotate(w[j-2],19)^(w[j-2]>>>10);
            w[j] = (w[j-16]+s0+w[j-7]+s1)>>>0;
        }

        let [a,b,c,d,e,f,g,h0] = h;

        for (let j = 0; j < 64; j++) {
            let S1 = rightRotate(e,6)^rightRotate(e,11)^rightRotate(e,25);
            let ch = (e&f)^(~e&g);
            let temp1 = (h0+S1+ch+k[j]+w[j])>>>0;

            let S0 = rightRotate(a,2)^rightRotate(a,13)^rightRotate(a,22);
            let maj = (a&b)^(a&c)^(b&c);
            let temp2 = (S0+maj)>>>0;

            h0=g; g=f; f=e;
            e=(d+temp1)>>>0;
            d=c; c=b; b=a;
            a=(temp1+temp2)>>>0;
        }

        h = h.map((val,i)=>(val+[a,b,c,d,e,f,g,h0][i])>>>0);
    }

    return h.map(x=>x.toString(16).padStart(8,'0')).join('');
}

function generate() {
    let input = document.getElementById("input").value;
    document.getElementById("output").innerText = sha256(input);
}
</script>

</body>
</html>
