<!DOCTYPE html>
<html>
<head>
    <title>CMAC Generator</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d);
            color: white;
            text-align: center;
        }

        .box {
            background: #2c3e50;
            width: 400px;
            margin: 100px auto;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 15px black;
        }

        input, button {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
        }

        button {
            background: #00ffcc;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #00cc99;
        }

        .output {
            margin-top: 15px;
            background: #0d1b2a;
            padding: 10px;
            border-radius: 5px;
            word-wrap: break-word;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>CMAC Generator</h2>

    <input type="text" id="msg" placeholder="Enter message">
    <input type="text" id="key" placeholder="Enter key">

    <button onclick="generateCMAC()">Generate CMAC</button>

    <div class="output" id="output"></div>
</div>

<script>
function stringToBytes(str){
    return Array.from(str).map(c => c.charCodeAt(0));
}

function bytesToHex(bytes){
    return bytes.map(b => b.toString(16).padStart(2,'0')).join('');
}

function encryptBlock(block, key){
    return block.map((b,i) => b ^ key[i]);
}

function cmac(message, key){
    let blockSize = 16;

    let msg = stringToBytes(message);
    let k = stringToBytes(key);

    while(k.length < 16) k.push(48);
    k = k.slice(0,16);

    while(msg.length % 16 !== 0) msg.push(0);

    let prev = new Array(16).fill(0);

    for(let i=0; i<msg.length; i+=16){
        let block = msg.slice(i,i+16);
        let x = block.map((b,j) => b ^ prev[j]);
        prev = encryptBlock(x, k);
    }

    return bytesToHex(prev);
}

function generateCMAC(){
    let m = document.getElementById("msg").value;
    let k = document.getElementById("key").value;

    document.getElementById("output").innerText = cmac(m, k);
}
</script>

</body>
</html>
